services:
  - type: web
    name: echoic-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://echoic.studio
      - key: ALLOWED_ORIGINS
        value: '["https://echoic.studio"]'
      - key: PYTHON_VERSION
        value: 3.12.0
