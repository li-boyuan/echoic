services:
  - type: web
    name: echoic-api
    runtime: docker
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://echoic.studio
      - key: ALLOWED_ORIGINS
        value: '["https://echoic.studio"]'
      - key: PYTHON_VERSION
        value: 3.12.0
