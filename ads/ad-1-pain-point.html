<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .card {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(160deg, #18181b 0%, #1a1a2e 50%, #18181b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%); top: -200px; right: -100px; }
    .glow2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%); bottom: -200px; left: -100px; }
    h1 { font-size: 72px; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px; position: relative; }
    .tagline { color: #f4f4f5; font-size: 44px; font-weight: 700; text-align: center; line-height: 1.3; margin-bottom: 24px; position: relative; }
    .sub { color: #a1a1aa; font-size: 28px; text-align: center; line-height: 1.5; margin-bottom: 48px; position: relative; }
    .badge { display: inline-block; padding: 16px 40px; background: #3b82f6; color: white; border-radius: 40px; font-size: 24px; font-weight: 600; position: relative; }
    .price { color: #71717a; font-size: 20px; margin-top: 20px; position: relative; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="glow2"></div>
    <h1>Echoic</h1>
    <div class="tagline">Your book deserves<br>an audiobook.</div>
    <div class="sub">Professional narration costs $3,000+.<br>Echoic does it for $9.99.</div>
    <div class="badge">Try Free — No Credit Card</div>
    <div class="price">echoic.studio</div>
  </div>
</body>
</html>
