<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .card {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(160deg, #18181b 0%, #1a1a2e 50%, #18181b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%); top: -200px; right: -100px; }
    .glow2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%); bottom: -200px; left: -100px; }
    h1 { font-size: 72px; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px; position: relative; }
    .tagline { color: #f4f4f5; font-size: 48px; font-weight: 700; text-align: center; line-height: 1.3; margin-bottom: 40px; position: relative; }
    .formats { display: flex; gap: 12px; margin-bottom: 40px; position: relative; }
    .format-chip { padding: 12px 28px; background: #27272a; border: 1px solid #3f3f46; border-radius: 28px; color: #d4d4d8; font-size: 22px; font-weight: 600; }
    .features { display: flex; gap: 32px; margin-bottom: 48px; position: relative; }
    .feature { text-align: center; }
    .feature .num { font-size: 36px; font-weight: 800; color: #60a5fa; margin-bottom: 4px; }
    .feature .label { font-size: 16px; color: #71717a; }
    .badge { display: inline-block; padding: 16px 40px; background: #3b82f6; color: white; border-radius: 40px; font-size: 24px; font-weight: 600; position: relative; }
    .url { color: #71717a; font-size: 20px; margin-top: 20px; position: relative; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="glow2"></div>
    <h1>Echoic</h1>
    <div class="tagline">Upload a manuscript.<br>Get an audiobook.</div>
    <div class="formats">
      <span class="format-chip">PDF</span>
      <span class="format-chip">EPUB</span>
      <span class="format-chip">DOCX</span>
      <span class="format-chip">TXT</span>
    </div>
    <div class="features">
      <div class="feature"><div class="num">6</div><div class="label">voices</div></div>
      <div class="feature"><div class="num">AI</div><div class="label">character casting</div></div>
      <div class="feature"><div class="num">auto</div><div class="label">chapter splitting</div></div>
    </div>
    <div class="badge">Free for Your First Book</div>
    <div class="url">echoic.studio</div>
  </div>
</body>
</html>
