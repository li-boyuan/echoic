<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .card {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(160deg, #18181b 0%, #1a1a2e 50%, #18181b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%); top: -200px; right: -100px; }
    .glow2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%); bottom: -200px; left: -100px; }
    h1 { font-size: 72px; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 24px; position: relative; }
    .tagline { color: #f4f4f5; font-size: 36px; font-weight: 700; text-align: center; line-height: 1.3; margin-bottom: 40px; position: relative; }
    .pipeline { display: flex; align-items: center; gap: 16px; margin-bottom: 48px; position: relative; }
    .pipeline .step { color: #f4f4f5; background: #27272a; padding: 12px 24px; border-radius: 12px; font-size: 20px; font-weight: 600; border: 1px solid #3f3f46; }
    .pipeline .arrow { color: #3b82f6; font-size: 28px; }
    .cast { position: relative; text-align: center; }
    .cast-title { color: #71717a; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .cast-line { font-size: 22px; margin: 8px 0; }
    .cast-line .char { color: #f4f4f5; font-weight: 600; }
    .cast-line .voice { color: #60a5fa; }
    .cast-line .dash { color: #52525b; }
    .url { color: #71717a; font-size: 20px; margin-top: 40px; position: relative; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="glow2"></div>
    <h1>Echoic</h1>
    <div class="tagline">AI that reads your book<br>before narrating it.</div>
    <div class="pipeline">
      <span class="step">Upload</span>
      <span class="arrow">→</span>
      <span class="step">AI Reads</span>
      <span class="arrow">→</span>
      <span class="step">Cast</span>
      <span class="arrow">→</span>
      <span class="step">Audiobook</span>
    </div>
    <div class="cast">
      <div class="cast-title">Auto Voice Casting</div>
      <div class="cast-line"><span class="char">Narrator</span> <span class="dash">—</span> <span class="voice">Kore</span></div>
      <div class="cast-line"><span class="char">Aunt Petunia</span> <span class="dash">—</span> <span class="voice">Leda</span></div>
      <div class="cast-line"><span class="char">Harry</span> <span class="dash">—</span> <span class="voice">Puck</span></div>
      <div class="cast-line"><span class="char">Hagrid</span> <span class="dash">—</span> <span class="voice">Charon</span></div>
    </div>
    <div class="url">echoic.studio</div>
  </div>
</body>
</html>
